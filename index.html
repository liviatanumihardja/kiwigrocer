<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KiwiGrocer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pak:        #F5C800;
      --wool:       #1B7A36;
      --nw:         #D41231;
      --bg:         #F7F5F0;
      --surface:    #FFFFFF;
      --border:     rgba(0,0,0,0.09);
      --text:       #1A1A18;
      --muted:      #6B6B65;
      --best:       #1B7A36;
      --best-bg:    #E6F4EB;
      --best-border:#8DC9A0;
      --radius-sm:  8px;
      --radius-md:  14px;
      --radius-lg:  20px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── Header ─────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
    }

    /* ─── Location bar ───────────────────────────────────────── */
    .location-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.25rem;
      padding: 8px 14px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: border-color 0.15s;
      width: fit-content;
      min-width: 260px;
      position: relative;
    }

    .location-bar:hover { border-color: var(--best); }
    .location-bar.editing {
      border-color: var(--best);
      box-shadow: 0 0 0 3px rgba(27,122,54,0.12);
      background: #fff;
    }

    .location-pin { color: var(--best); flex-shrink: 0; display: flex; align-items: center; }
    .location-pin svg { width: 16px; height: 16px; }

    .location-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }

    #location-display {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #location-input {
      display: none;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      border: none;
      outline: none;
      background: transparent;
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      min-width: 0;
    }

    .location-bar.editing #location-display { display: none; }
    .location-bar.editing #location-input   { display: block; }

    .location-edit-btn {
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      transition: color 0.12s, background 0.12s;
    }
    .location-edit-btn:hover { color: var(--best); background: var(--best-bg); }

    .location-suggestions {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1.5px solid var(--best-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }
    .location-suggestions.visible { display: block; }

    .location-suggestion {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.1s;
      color: var(--text);
    }
    .location-suggestion:hover { background: var(--best-bg); }
    .location-suggestion + .location-suggestion { border-top: 1px solid var(--border); }

    .suggestion-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--best);
      flex-shrink: 0;
    }

    /* ─── App name ───────────────────────────────────────────── */
    .app-name {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 2.4rem;
      font-weight: 400;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .app-name em { font-style: italic; color: var(--best); }

    .header-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    /* ─── Search ─────────────────────────────────────────────── */
    .search-wrap { position: relative; }

    .search-icon {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    .search-icon svg { display: block; width: 18px; height: 18px; }

    #search-input {
      width: 100%;
      height: 52px;
      padding: 0 48px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #search-input::placeholder { color: var(--muted); }
    #search-input:focus {
      border-color: var(--best);
      box-shadow: 0 0 0 3px rgba(27,122,54,0.12);
      background: #fff;
    }

    .clear-btn {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: none;
      padding: 4px;
      border-radius: 50%;
      line-height: 1;
    }
    .clear-btn:hover { color: var(--text); }
    .clear-btn.visible { display: flex; align-items: center; }

    /* ─── Category pills ─────────────────────────────────────── */
    .category-bar {
      max-width: 900px;
      margin: 1.25rem auto 0;
      padding: 0 2rem;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .pill:hover { border-color: var(--best); color: var(--best); }
    .pill.active { background: var(--best); border-color: var(--best); color: #fff; }

    /* ─── Main ───────────────────────────────────────────────── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
    }

    /* ─── Section labels ─────────────────────────────────────── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    #results-section { margin-bottom: 2.5rem; }

    #results-count {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ─── Loading overlay ────────────────────────────────────── */
    #grid-loading {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    #grid-loading.visible { display: flex; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--best);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Product grid ───────────────────────────────────────── */
    #product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    /* ─── Product card ───────────────────────────────────────── */
    .product-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      animation: fadeUp 0.25s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .product-card:hover {
      border-color: var(--best);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.07);
    }
    .product-card.selected {
      border-color: var(--best);
      box-shadow: 0 0 0 3px rgba(27,122,54,0.15);
    }

    .card-emoji  { font-size: 2rem; margin-bottom: 0.6rem; display: block; }
    .card-category {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.25rem;
    }
    .card-name   { font-size: 14px; font-weight: 500; line-height: 1.35; margin-bottom: 0.5rem; }
    .card-unit   { font-size: 12px; color: var(--muted); margin-bottom: 0.85rem; }

    .card-price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-best-price {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--best);
    }

    .card-best-label {
      font-size: 11px; font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .card-best-label.pak  { background: #FFF7CC; color: #7A6200; border: 1px solid #E8C800; }
    .card-best-label.wool { background: var(--best-bg); color: #0E5C26; border: 1px solid #8DC9A0; }
    .card-best-label.nw   { background: #FDEAED; color: #A00E25; border: 1px solid #F4A0AE; }

    /* ─── Empty state ────────────────────────────────────────── */
    #empty-state {
      display: none;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
    }
    #empty-state .empty-emoji { font-size: 3rem; margin-bottom: 1rem; }
    #empty-state p { font-size: 15px; }

    /* ─── Comparison panel ───────────────────────────────────── */
    #comparison-section { display: none; animation: fadeUp 0.3s ease; margin-bottom: 2rem; }
    #comparison-section.visible { display: block; }

    .comparison-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .comparison-header {
      padding: 1.5rem 1.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .comparison-header-emoji { font-size: 2.5rem; flex-shrink: 0; }

    .comparison-item-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.45rem;
      line-height: 1.2;
      margin-bottom: 0.2rem;
    }
    .comparison-item-meta { font-size: 13px; color: var(--muted); }

    .comparison-close {
      margin-left: auto;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      width: 34px; height: 34px;
      cursor: pointer;
      font-size: 18px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }
    .comparison-close:hover { border-color: var(--text); color: var(--text); }

    /* ─── Store columns ──────────────────────────────────────── */
    .store-cols {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }

    .store-col {
      padding: 1.5rem 1.25rem;
      text-align: center;
      transition: background 0.12s;
    }
    .store-col + .store-col { border-left: 1px solid var(--border); }
    .store-col.best-price   { background: var(--best-bg); }

    .store-col-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-bottom: 6px;
    }
    .store-col-dot.pak  { background: var(--pak); border: 1.5px solid #C9A300; }
    .store-col-dot.wool { background: var(--wool); }
    .store-col-dot.nw   { background: var(--nw); }

    .store-col-name {
      font-size: 12px; font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.5rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .store-col-price {
      font-family: 'DM Serif Display', serif;
      font-size: 1.7rem;
      color: var(--text);
      display: block;
      margin-bottom: 0.5rem;
    }
    .store-col.best-price .store-col-price { color: var(--best); }

    .best-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px; font-weight: 600;
      color: var(--best);
      background: #fff;
      border: 1.5px solid var(--best-border);
      border-radius: 999px;
      padding: 2px 9px;
    }
    .best-badge svg { width: 10px; height: 10px; }

    .you-save {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      color: var(--best);
    }

    /* ─── Submit section ─────────────────────────────────────── */
    .submit-section {
      border-top: 1px solid var(--border);
      padding: 1.1rem 1.75rem;
    }

    .submit-label {
      font-size: 12px; font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .submit-form {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .submit-form select,
    .submit-form input {
      height: 38px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      padding: 0 10px;
      transition: border-color 0.15s;
    }
    .submit-form select:focus,
    .submit-form input:focus { border-color: var(--best); background: #fff; }
    .submit-form select { flex: 1; min-width: 130px; }

    .price-input-wrap { position: relative; display: flex; align-items: center; }
    .price-dollar {
      position: absolute; left: 10px;
      font-size: 14px; color: var(--muted);
      pointer-events: none;
    }
    #submit-price { width: 90px; padding-left: 22px; }

    #submit-btn {
      height: 38px;
      padding: 0 18px;
      background: var(--best);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    #submit-btn:hover    { opacity: 0.88; }
    #submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .submit-feedback { font-size: 13px; margin-top: 6px; min-height: 18px; }
    .submit-feedback.success { color: var(--best); }
    .submit-feedback.error   { color: var(--nw); }

    /* ─── Responsive ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      .app-name { font-size: 1.8rem; }
      #product-grid { grid-template-columns: repeat(2, 1fr); }
      .store-col { padding: 1rem 0.75rem; }
      .store-col-price { font-size: 1.35rem; }
      .comparison-header { padding: 1.25rem; }
      .submit-section { padding: 1rem 1.25rem; }
      .location-bar { min-width: 0; width: 100%; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">

      <div class="location-bar" id="location-bar">
        <span class="location-pin" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
            <circle cx="12" cy="9" r="2.5"/>
          </svg>
        </span>
        <span class="location-label">Your area</span>
        <span id="location-display">Auckland, Auckland</span>
        <input id="location-input" type="text" placeholder="Enter suburb or city…" autocomplete="off" />
        <button class="location-edit-btn" id="location-edit-btn" aria-label="Change location">Change</button>
        <div class="location-suggestions" id="location-suggestions" role="listbox"></div>
      </div>

      <h1 class="app-name">Kiwi<em>Grocer</em></h1>
      <p class="header-sub">Helping Kiwis save money by comparing grocery prices near you.</p>

      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input id="search-input" type="text" placeholder="Search for milk, bread, eggs…" autocomplete="off" aria-label="Search grocery items" />
        <button class="clear-btn" id="clear-btn" aria-label="Clear search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

    </div>
  </header>

  <nav class="category-bar" id="category-bar" aria-label="Filter by category">
    <button class="pill active" data-category="All">All</button>
  </nav>

  <main>

    <section id="comparison-section" aria-label="Price comparison">
      <p class="section-label">Price Comparison</p>
      <div class="comparison-card">

        <div class="comparison-header">
          <span class="comparison-header-emoji" id="comp-emoji"></span>
          <div>
            <p class="comparison-item-name" id="comp-name"></p>
            <p class="comparison-item-meta" id="comp-meta"></p>
          </div>
          <button class="comparison-close" id="comparison-close" aria-label="Close">✕</button>
        </div>

        <div class="store-cols" id="store-cols"></div>

        <div class="submit-section">
          <p class="submit-label">🙌 Seen a different price in-store? Submit it:</p>
          <div class="submit-form">
            <select id="submit-store">
              <option value="">Select store…</option>
              <option value="pak-n-save|Pak'nSave">Pak'nSave</option>
              <option value="woolworths|Woolworths">Woolworths</option>
              <option value="new-world|New World">New World</option>
            </select>
            <div class="price-input-wrap">
              <span class="price-dollar">$</span>
              <input id="submit-price" type="number" min="0.01" max="500" step="0.01" placeholder="0.00" />
            </div>
            <button id="submit-btn">Submit</button>
          </div>
          <p class="submit-feedback" id="submit-feedback"></p>
        </div>

      </div>
    </section>

    <section id="results-section">
      <p class="section-label" id="results-label">All Products</p>
      <div id="grid-loading">
        <span class="spinner"></span>
        <span id="loading-text">Loading prices for Auckland…</span>
      </div>
      <p id="results-count"></p>
      <div id="product-grid" role="list"></div>
      <div id="empty-state" role="status" aria-live="polite">
        <div class="empty-emoji">🔍</div>
        <p>No products match "<span id="empty-query"></span>".</p>
      </div>
    </section>

  </main>

  <script>

    { id:20, name:"Agria Potatoes",               category:"Vegetables",     unit:"2kg bag",     emoji:"🥔", prices:{"pak-n-save":3.49,"woolworths":3.99,"new-world":4.49} },
    { id:21, name:"Iceberg Lettuce",              category:"Vegetables",     unit:"per head",    emoji:"🥗", prices:{"pak-n-save":1.99,"woolworths":2.49,"new-world":2.79} },
    { id:22, name:"Tomatoes",                     category:"Vegetables",     unit:"per kg",      emoji:"🍅", prices:{"pak-n-save":3.99,"woolworths":4.49,"new-world":4.99} },
    { id:23, name:"Brown Onions",                 category:"Vegetables",     unit:"1kg bag",     emoji:"🧅", prices:{"pak-n-save":1.99,"woolworths":2.29,"new-world":2.49} },
    { id:24, name:"Garlic",                       category:"Vegetables",     unit:"per bulb",    emoji:"🧄", prices:{"pak-n-save":0.79,"woolworths":0.99,"new-world":1.19} },
    { id:25, name:"Beef Mince",                   category:"Meat & Seafood", unit:"500g",        emoji:"🥩", prices:{"pak-n-save":7.99,"woolworths":9.49,"new-world":10.99} },
    { id:26, name:"Chicken Breast",               category:"Meat & Seafood", unit:"per kg",      emoji:"🍗", prices:{"pak-n-save":9.99,"woolworths":11.99,"new-world":12.99} },
    { id:27, name:"Pork Sausages",                category:"Meat & Seafood", unit:"500g",        emoji:"🌭", prices:{"pak-n-save":4.99,"woolworths":5.99,"new-world":6.49} },
    { id:28, name:"Hoki Fish Fillets",            category:"Meat & Seafood", unit:"400g",        emoji:"🐟", prices:{"pak-n-save":6.99,"woolworths":7.99,"new-world":8.49} },
    { id:29, name:"Pam's White Rice",             category:"Pantry",         unit:"2kg",         emoji:"🍚", prices:{"pak-n-save":3.49,"woolworths":3.99,"new-world":4.49} },
    { id:30, name:"Barilla Spaghetti",            category:"Pantry",         unit:"500g",        emoji:"🍝", prices:{"pak-n-save":2.49,"woolworths":2.99,"new-world":3.29} },
  ];

  const NZ_LOCATIONS = [
    "Auckland, Auckland", "Wellington, Wellington", "Christchurch, Canterbury",
    "Hamilton, Waikato", "Tauranga, Bay of Plenty", "Dunedin, Otago",
    "Palmerston North, Manawatū", "Napier, Hawke's Bay", "Nelson, Nelson",
    "Rotorua, Bay of Plenty", "New Plymouth, Taranaki", "Invercargill, Southland",
    "Whangarei, Northland", "Gisborne, Gisborne", "Blenheim, Marlborough",
    "Queenstown, Otago", "Timaru, Canterbury", "Hastings, Hawke's Bay",
    "Levin, Manawatū", "Masterton, Wairarapa",
  ];

  // ═══════════════════════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════════════════════

  let query           = "";
  let activeCategory  = "All";
  let selectedProduct = null;
  let currentLocation = "Auckland, Auckland";
  let livePrices = {};

  // ═══════════════════════════════════════════════════════════════
  // ELEMENT REFS
  // ═══════════════════════════════════════════════════════════════

  const searchInput         = document.getElementById("search-input");
  const clearBtn            = document.getElementById("clear-btn");
  const productGrid         = document.getElementById("product-grid");
  const emptyState          = document.getElementById("empty-state");
  const emptyQuery          = document.getElementById("empty-query");
  const resultsCount        = document.getElementById("results-count");
  const resultsLabel        = document.getElementById("results-label");
  const categoryBar         = document.getElementById("category-bar");
  const gridLoading         = document.getElementById("grid-loading");
  const loadingText         = document.getElementById("loading-text");
  const compSection         = document.getElementById("comparison-section");
  const compEmoji           = document.getElementById("comp-emoji");
  const compName            = document.getElementById("comp-name");
  const compMeta            = document.getElementById("comp-meta");
  const storeCols           = document.getElementById("store-cols");
  const compClose           = document.getElementById("comparison-close");
  const locationBar         = document.getElementById("location-bar");
  const locationDisplay     = document.getElementById("location-display");
  const locationInput       = document.getElementById("location-input");
  const locationEditBtn     = document.getElementById("location-edit-btn");
  const locationSuggestions = document.getElementById("location-suggestions");

  // ═══════════════════════════════════════════════════════════════
  // PRICE HELPERS
  // ═══════════════════════════════════════════════════════════════

  function getPrice(product, storeId) {
    if (livePrices[product.id] && livePrices[product.id][storeId] !== undefined) {
      return livePrices[product.id][storeId];
    }
    return product.prices[storeId];
  }

  function bestStoreForProduct(product) {
    let bestStore = null, bestP = Infinity;
    STORES.forEach(s => {
      const p = getPrice(product, s.id);
      if (p < bestP) { bestP = p; bestStore = s; }
    });
    return { store: bestStore, price: bestP };
  }

  function fmt(n) { return "$" + Number(n).toFixed(2); }

  // ═══════════════════════════════════════════════════════════════
  // SIMULATED MARKET PRICE ENGINE (With Rotating Store Winners)
  // ═══════════════════════════════════════════════════════════════

  async function fetchAllPrices(location) {
    gridLoading.classList.add("visible");
    loadingText.textContent = `Fetching latest market data for ${location.split(",")[0]}…`;
    productGrid.style.opacity       = "0.45";
    productGrid.style.pointerEvents = "none";

    // Artificial network lag to make it feel authentic
    await new Promise(resolve => setTimeout(resolve, 450));

    // 1. Establish regional variance multipliers
    const cityName = location.split(",")[0].trim().toLowerCase();
    let regionalMultiplier = 1.00;

    if (cityName.includes("wellington") || cityName.includes("christchurch")) {
      regionalMultiplier = 1.02;
    } else if (cityName.includes("queenstown") || cityName.includes("nelson") || cityName.includes("invercargill")) {
      regionalMultiplier = 1.07;
    } else if (cityName.includes("hamilton") || cityName.includes("tauranga")) {
      regionalMultiplier = 0.99;
    }

    const newPrices = {};

    // 2. Loop through products and assign dynamic pricing variables
    PRODUCTS.forEach(product => {
      newPrices[product.id] = {};

      // Seed a pseudo-random value tied to this item inside this specific location
      // This ensures changing cities shuffles which items are on sale where!
      const cityLengthSeed = location.length + product.id;
      const promotionalStoreIndex = cityLengthSeed % 3; // 0 = PakNSave, 1 = Woolworths, 2 = New World

      STORES.forEach(store => {
        let basePrice = product.prices[store.id];
        
        // Add tiny item fluctuation variance 
        const microFluc = 1 + (((product.id * store.name.length) % 5 - 2) * 0.01);
        let finalPrice = basePrice * regionalMultiplier * microFluc;

        // 3. SPECIALS ENGINE: Let Woolworths and New World win some items!
        // If this store is selected to run a promotional special for this item...
        if (store.id === "woolworths" && promotionalStoreIndex === 1) {
          finalPrice = finalPrice * 0.82; // Apply a massive 18% off Woolworths Weekly Club Special
        } else if (store.id === "new-world" && promotionalStoreIndex === 2) {
          finalPrice = finalPrice * 0.80; // Apply an 20% off New World Super Saver Local Deal
        }

        // Clean retail rounding ($X.19, $X.39, $X.59, $X.99)
        let cents = finalPrice % 1;
        if (cents < 0.25) finalPrice = Math.floor(finalPrice) + 0.19;
        else if (cents < 0.45) finalPrice = Math.floor(finalPrice) + 0.39;
        else if (cents < 0.75) finalPrice = Math.floor(finalPrice) + 0.59;
        else finalPrice = Math.floor(finalPrice) + 0.99;

        newPrices[product.id][store.id] = parseFloat(finalPrice.toFixed(2));
      });
    });

    // Commit to state and wake up the UI
    livePrices = newPrices;
    gridLoading.classList.remove("visible");
    productGrid.style.opacity       = "1";
    productGrid.style.pointerEvents = "auto";

    render();
    if (selectedProduct) renderComparison(selectedProduct);
  }
  
  // ═══════════════════════════════════════════════════════════════
  // LOCATION
  // ═══════════════════════════════════════════════════════════════

  function showSuggestions(val) {
    const matches = NZ_LOCATIONS.filter(l =>
      l.toLowerCase().includes(val.toLowerCase())
    ).slice(0, 6);

    if (!matches.length) {
      locationSuggestions.classList.remove("visible");
      return;
    }

    locationSuggestions.innerHTML = matches.map(l => `
      <div class="location-suggestion" role="option" data-loc="${l}">
        <span class="suggestion-dot"></span>${l}
      </div>`).join("");

    locationSuggestions.classList.add("visible");
  }

  function setLocation(loc) {
    if (!loc) return;
    currentLocation = loc;
    locationDisplay.textContent = loc;
    locationInput.value = "";
    locationBar.classList.remove("editing");
    locationSuggestions.classList.remove("visible");
    locationEditBtn.textContent = "Change";
    fetchAllPrices(loc);
  }

  locationEditBtn.addEventListener("click", e => {
    e.stopPropagation();
    if (locationBar.classList.contains("editing")) {
      setLocation(locationInput.value.trim() || currentLocation);
    } else {
      locationBar.classList.add("editing");
      locationInput.value = currentLocation;
      locationEditBtn.textContent = "Save";
      locationInput.focus();
      locationInput.select();
      showSuggestions(currentLocation);
    }
  });

  locationInput.addEventListener("input", () => showSuggestions(locationInput.value));

  locationInput.addEventListener("keydown", e => {
    if (e.key === "Enter")  setLocation(locationInput.value.trim() || currentLocation);
    if (e.key === "Escape") setLocation(currentLocation);
  });

  locationSuggestions.addEventListener("click", e => {
    const item = e.target.closest(".location-suggestion");
    if (item) setLocation(item.dataset.loc);
  });

  document.addEventListener("click", e => {
    if (!locationBar.contains(e.target)) {
      locationBar.classList.remove("editing");
      locationSuggestions.classList.remove("visible");
      locationEditBtn.textContent = "Change";
    }
  });

  // ═══════════════════════════════════════════════════════════════
  // CATEGORY PILLS
  // ═══════════════════════════════════════════════════════════════

  const categories = ["All", ...new Set(PRODUCTS.map(p => p.category))].sort((a, b) => a === "All" ? -1 : 0);

  categories.forEach(cat => {
    if (cat === "All") return;
    const btn = document.createElement("button");
    btn.className    = "pill";
    btn.dataset.category = cat;
    btn.textContent  = cat;
    categoryBar.appendChild(btn);
  });

  categoryBar.addEventListener("click", e => {
    const pill = e.target.closest(".pill");
    if (!pill) return;
    activeCategory = pill.dataset.category;
    document.querySelectorAll(".pill").forEach(p => p.classList.toggle("active", p === pill));
    render();
  });

  // ═══════════════════════════════════════════════════════════════
  // SEARCH
  // ═══════════════════════════════════════════════════════════════

  searchInput.addEventListener("input", () => {
    query = searchInput.value.trim();
    clearBtn.classList.toggle("visible", query.length > 0);
    render();
  });

  clearBtn.addEventListener("click", () => {
    searchInput.value = "";
    query = "";
    clearBtn.classList.remove("visible");
    searchInput.focus();
    render();
  });

  // ═══════════════════════════════════════════════════════════════
  // FILTERING
  // ═══════════════════════════════════════════════════════════════

  function getFiltered() {
    return PRODUCTS.filter(p => {
      const matchCat = activeCategory === "All" || p.category === activeCategory;
      const matchQ   = !query
        || p.name.toLowerCase().includes(query.toLowerCase())
        || p.category.toLowerCase().includes(query.toLowerCase());
      return matchCat && matchQ;
    });
  }

  // ═══════════════════════════════════════════════════════════════
  // RENDER: PRODUCT CARDS
  // ═══════════════════════════════════════════════════════════════

  function renderCards(products) {
    productGrid.innerHTML = "";

    products.forEach((p, i) => {
      const { store, price } = bestStoreForProduct(p);

      const card = document.createElement("div");
      card.className = "product-card" + (selectedProduct?.id === p.id ? " selected" : "");
      card.setAttribute("role", "listitem");
      card.style.animationDelay = `${i * 28}ms`;

      card.innerHTML = `
        <span class="card-emoji">${p.emoji}</span>
        <p class="card-category">${p.category}</p>
        <p class="card-name">${p.name}</p>
        <p class="card-unit">${p.unit}</p>
        <div class="card-price-row">
          <span class="card-best-price">${fmt(price)}</span>
          <span class="card-best-label ${store.dotClass}">${store.name}</span>
        </div>
      `;

      card.addEventListener("click", () => selectProduct(p));
      productGrid.appendChild(card);
    });
  }

  // ═══════════════════════════════════════════════════════════════
  // RENDER: COMPARISON PANEL
  // ═══════════════════════════════════════════════════════════════

  function renderComparison(product) {
    compEmoji.textContent = product.emoji;
    compName.textContent  = product.name;
    compMeta.textContent  = `${product.unit} · ${product.category}`;

    const prices = STORES.map(s => ({ store: s, price: getPrice(product, s.id) }));
    const minP   = Math.min(...prices.map(x => x.price));
    const maxP   = Math.max(...prices.map(x => x.price));
    const saving = (maxP - minP).toFixed(2);

    storeCols.innerHTML = prices.map(({ store, price }) => {
      const isBest = price === minP;
      return `
        <div class="store-col ${isBest ? "best-price" : ""}">
          <span class="store-col-dot ${store.dotClass}"></span>
          <p class="store-col-name">${store.name}</p>
          <span class="store-col-price">${fmt(price)}</span>
          ${isBest ? `
            <span class="best-badge">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              Best Price
            </span>
            <span class="you-save">You save $${saving}</span>
          ` : ""}
        </div>`;
    }).join("");

    compSection.classList.add("visible");
    compSection.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  // ═══════════════════════════════════════════════════════════════
  // SELECT / DESELECT PRODUCT
  // ═══════════════════════════════════════════════════════════════

  function selectProduct(product) {
    selectedProduct = selectedProduct?.id === product.id ? null : product;
    render();
    if (selectedProduct) {
      renderComparison(selectedProduct);
    } else {
      compSection.classList.remove("visible");
    }
  }

  compClose.addEventListener("click", () => {
    selectedProduct = null;
    compSection.classList.remove("visible");
    render();
  });

  // ═══════════════════════════════════════════════════════════════
  // SUBMIT A PRICE (Simulated UI-only Version)
  // ═══════════════════════════════════════════════════════════════

  document.getElementById("submit-btn").addEventListener("click", () => {
    const storeVal = document.getElementById("submit-store").value;
    const priceVal = parseFloat(document.getElementById("submit-price").value);
    const feedback = document.getElementById("submit-feedback");
    const btn      = document.getElementById("submit-btn");

    feedback.textContent = "";
    feedback.className   = "submit-feedback";

    if (!storeVal) { 
      feedback.textContent = "Please select a store."; 
      feedback.classList.add("error"); 
      return; 
    }
    if (!priceVal || priceVal <= 0) { 
      feedback.textContent = "Please enter a valid price."; 
      feedback.classList.add("error"); 
      return; 
    }

    btn.disabled = true;
    btn.textContent = "Submitting…";

    setTimeout(() => {
      feedback.textContent = "✓ Thanks! Your price change proposal has been saved for review.";
      feedback.classList.add("success");
      
      document.getElementById("submit-store").value = "";
      document.getElementById("submit-price").value = "";
      
      btn.disabled = false;
      btn.textContent = "Submit";
    }, 800); 
  });

  // ═══════════════════════════════════════════════════════════════
  // MAIN RENDER
  // ═══════════════════════════════════════════════════════════════

  function render() {
    const filtered = getFiltered();

    emptyState.style.display  = "none";
    productGrid.style.display = "grid";
    resultsLabel.textContent  = query
      ? "Search Results"
      : activeCategory !== "All" ? activeCategory : "All Products";
    resultsCount.textContent  = `${filtered.length} item${filtered.length !== 1 ? "s" : ""}`;

    if (filtered.length === 0) {
      productGrid.style.display = "none";
      emptyState.style.display  = "block";
      emptyQuery.textContent    = query;
      return;
    }

    renderCards(filtered);
  }

  // ═══════════════════════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════════════════════

  render();
  fetchAllPrices(currentLocation);

  </script>
